[package]
name = "vibix"
version.workspace = true
edition.workspace = true
authors.workspace = true
license.workspace = true

[lib]
name = "vibix"
path = "src/lib.rs"

[[bin]]
name = "vibix"
path = "src/main.rs"

[dependencies]
limine = "0.5"
spin = { version = "0.9", default-features = false, features = ["mutex", "spin_mutex", "lazy"] }
x86_64 = "0.15"
uart_16550 = "0.3"
font8x8 = { version = "0.3", default-features = false, features = ["unicode"] }
linked_list_allocator = "0.10"
pic8259 = "0.11"
pc-keyboard = "0.8"

[features]
default = []
# Enable to trigger a UD2 after init; verifies the invalid-opcode handler path.
fault-test = []
# Enable to deliberately overflow the #DF IST stack after init; verifies
# that the guard page below the stack catches overflow as a #PF instead
# of letting it silently corrupt .bss. Manual verification only —
# successful overflow is indistinguishable from other crashes in CI.
ist-overflow-test = []

[[test]]
name = "basic_boot"
harness = false

[[test]]
name = "heap_alloc"
harness = false

[[test]]
name = "should_panic"
harness = false

[[test]]
name = "timer_tick"
harness = false

[[test]]
name = "paging"
harness = false

[[test]]
name = "tasks"
harness = false

[[test]]
name = "heap_grow"
harness = false

[[test]]
name = "preempt"
harness = false
