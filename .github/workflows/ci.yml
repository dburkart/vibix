name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # RFC 0004 Workstream A ↔ B gate: the `vfs_creds` feature must not be
  # the default until Workstream B lands `Task::credentials`. Without
  # per-task credentials, every VFS write syscall runs as root
  # (`Credential::kernel()`) — enabling the feature before B merges
  # would expose an unauthenticated full-DAC bypass. This is a
  # belt-and-suspenders second line of defense behind the compile-time
  # feature gate in `kernel/src/arch/x86_64/syscall.rs`.
  #
  # Rule:
  #   - If `Task::credentials` is absent from the tree, `default` in
  #     `kernel/Cargo.toml` must not contain `vfs_creds`.
  #   - If `Task::credentials` is present, the gate is satisfied;
  #     enabling `vfs_creds` by default is allowed.
  vfs-creds-gate:
    name: RFC 0004 vfs_creds gate
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Check vfs_creds is not default-on without Task::credentials
        run: |
          set -euo pipefail
          # Workstream B sentinel: presence of `Task::credentials` on the
          # Task type specifically. We scope to files that define or
          # impl `Task` so an unrelated `credentials` field on some other
          # type (e.g. a session or config struct) can't satisfy the gate.
          task_files=$(grep -rlE '(^|[[:space:]])(struct|impl([[:space:]]|<))[[:space:]]*Task([[:space:]]|<|\{|$)' kernel/src 2>/dev/null || true)
          if [ -n "$task_files" ]; then
            if echo "$task_files" | xargs grep -E '(pub[[:space:]]+)?credentials[[:space:]]*:[[:space:]]*.*Credential' >/dev/null 2>&1 \
               || echo "$task_files" | xargs grep -E 'fn[[:space:]]+credentials[[:space:]]*\(' >/dev/null 2>&1; then
              echo "Task::credentials present — gate satisfied."
              exit 0
            fi
          fi
          # Sentinel absent: verify `vfs_creds` is not on by default.
          # We parse Cargo.toml with Python/tomllib instead of awk ranges —
          # `awk '/^\[features\]/,/^\[/'` fails open because the end
          # pattern also matches the opening `[features]` header, making
          # the awk block a single-line no-op and turning the DAC-bypass
          # gate into a rubber stamp.
          if python3 -c "import sys; tomllib=__import__('tomllib') if sys.version_info>=(3,11) else __import__('tomli'); cargo=tomllib.load(open('kernel/Cargo.toml','rb')); sys.exit(1 if 'vfs_creds' in cargo.get('features',{}).get('default',[]) else 0)"; then
            echo "vfs_creds is gated off and Task::credentials is absent — consistent."
          else
            echo "ERROR: vfs_creds is default-on but Task::credentials is absent." >&2
            echo "This would expose an unauthenticated DAC-bypass window (RFC 0004 §Security)." >&2
            exit 1
          fi

  # Fast lane: formatting, clippy (host-only), and release build sanity.
  # Does not need QEMU, so it finishes well ahead of the kernel test jobs.
  fmt-build:
    name: fmt + build (release)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Install system dependencies
        run: |
          sudo apt-get update -q
          sudo apt-get install -y --no-install-recommends \
            xorriso build-essential

      - name: Set up Rust toolchain
        uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9 # master
        with:
          toolchain: nightly
          components: rust-src, llvm-tools, rustfmt, clippy
          targets: x86_64-unknown-none

      - name: Cache cargo + limine
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
            build/limine
          key: ${{ runner.os }}-cargo-fmt-build-${{ hashFiles('**/Cargo.lock', 'xtask/src/main.rs') }}
          restore-keys: |
            ${{ runner.os }}-cargo-fmt-build-
            ${{ runner.os }}-cargo-

      - name: cargo fmt --check
        run: cargo fmt --all -- --check

      # Kernel clippy requires --target x86_64-unknown-none + -Z build-std,
      # which isn't wired through xtask yet. Scope clippy to the host-crate
      # (xtask) for now; kernel clippy is a follow-up.
      - name: cargo clippy (xtask)
        run: cargo clippy -p xtask --all-targets -- -D warnings

      - name: cargo xtask build --release
        run: cargo xtask build --release

      # RFC 0005 Phase 1 hardening (#669). Static guard that the
      # `#[cfg(feature = "sched-mock")]` gate around `MockClock` /
      # `MockIrqSource` from #668 actually holds: even if a future PR
      # accidentally enables `sched-mock` in the default feature set or
      # a non-gated `pub use` re-exports a mock type, this step fails
      # the release pipeline before the binary ships. Runs `llvm-nm`
      # over the freshly-built release kernel ELF (and the ISO-bundled
      # ELF as defense-in-depth) and fails on any forbidden symbol.
      #
      # See `docs/RFC/0005-scheduler-irq-seam.md` "Test-time wiring"
      # and Security review B1.
      - name: RFC 0005 nm-check (no MockClock/MockIrqSource in release)
        run: cargo xtask nm-check --release

  # RFC 0006 / issue #714: host-target buildability of the kernel crate.
  # Phase 2 (host-side DST simulator) sits on top of `cargo build -p
  # vibix --lib --target x86_64-unknown-linux-gnu --features sched-mock`
  # actually compiling — every other Phase-2 issue waits on this gate
  # holding. If a future PR re-introduces a `target_os = "none"`-only
  # API into a host-buildable code path, this job fails fast,
  # independent of the bare-metal build and the nm-check.
  host-build:
    name: host build (sched-mock)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Install system dependencies
        run: |
          sudo apt-get update -q
          sudo apt-get install -y --no-install-recommends \
            build-essential

      - name: Set up Rust toolchain
        uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9 # master
        with:
          # Match the dated nightly in `rust-toolchain.toml` so the
          # action and rustup don't briefly disagree on which nightly
          # to install (a floating `nightly` here would still work via
          # rustup auto-fetch, but installs two toolchains per run).
          toolchain: nightly-2026-04-16
          components: rust-src, llvm-tools, rustfmt, clippy
          targets: x86_64-unknown-none, x86_64-unknown-linux-gnu

      - name: Cache cargo
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-host-build-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-host-build-
            ${{ runner.os }}-cargo-

      - name: cargo build --target x86_64-unknown-linux-gnu --features sched-mock
        run: |
          cargo build -p vibix --lib \
            --target x86_64-unknown-linux-gnu \
            --features sched-mock

  unit-tests:
    name: host unit tests
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Install system dependencies
        run: |
          sudo apt-get update -q
          sudo apt-get install -y --no-install-recommends \
            build-essential

      - name: Set up Rust toolchain
        uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9 # master
        with:
          toolchain: nightly
          components: rust-src, llvm-tools, rustfmt, clippy
          targets: x86_64-unknown-none

      - name: Cache cargo
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-unit-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-unit-
            ${{ runner.os }}-cargo-

      - name: cargo xtask test-unit
        run: cargo xtask test-unit

  integration-tests:
    name: integration tests (QEMU)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Install system dependencies
        run: |
          sudo apt-get update -q
          sudo apt-get install -y --no-install-recommends \
            qemu-system-x86 xorriso build-essential

      - name: Set up Rust toolchain
        uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9 # master
        with:
          toolchain: nightly
          components: rust-src, llvm-tools, rustfmt, clippy
          targets: x86_64-unknown-none

      - name: Cache cargo + limine
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
            build/limine
          key: ${{ runner.os }}-cargo-integration-${{ hashFiles('**/Cargo.lock', 'xtask/src/main.rs') }}
          restore-keys: |
            ${{ runner.os }}-cargo-integration-
            ${{ runner.os }}-cargo-

      - name: cargo xtask test-integration
        run: cargo xtask test-integration

  ext2-image:
    name: ext2 rootfs image (determinism + hash)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Install system dependencies
        run: |
          sudo apt-get update -q
          sudo apt-get install -y --no-install-recommends \
            e2fsprogs build-essential

      - name: Set up Rust toolchain
        uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9 # master
        with:
          toolchain: nightly
          components: rust-src, llvm-tools, rustfmt, clippy
          targets: x86_64-unknown-none

      - name: Cache cargo
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-ext2-${{ hashFiles('**/Cargo.lock', 'xtask/src/ext2_image.rs') }}
          restore-keys: |
            ${{ runner.os }}-cargo-ext2-
            ${{ runner.os }}-cargo-

      # First build — must match the committed sha256 fixture.
      - name: cargo xtask ext2-image
        run: cargo xtask ext2-image

      # Second build into a separate path — byte-identity check. A
      # diff here means the build is not reproducible, even if the
      # hash gate happened to pass (e.g. a fix-up that touched bytes
      # but kept the hash stable, which is impossible under SHA-256
      # but cheap to double-check by direct compare).
      - name: Byte-identical rebuild
        run: |
          cp target/vibix-root.ext2 /tmp/vibix-root.ext2.first
          rm target/vibix-root.ext2
          cargo xtask ext2-image
          cmp /tmp/vibix-root.ext2.first target/vibix-root.ext2

  smoke:
    name: smoke test
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Install system dependencies
        run: |
          sudo apt-get update -q
          sudo apt-get install -y --no-install-recommends \
            qemu-system-x86 xorriso build-essential

      - name: Set up Rust toolchain
        uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9 # master
        with:
          toolchain: nightly
          components: rust-src, llvm-tools, rustfmt, clippy
          targets: x86_64-unknown-none

      - name: Cache cargo + limine
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
            build/limine
          key: ${{ runner.os }}-cargo-smoke-${{ hashFiles('**/Cargo.lock', 'xtask/src/main.rs') }}
          restore-keys: |
            ${{ runner.os }}-cargo-smoke-
            ${{ runner.os }}-cargo-

      - name: cargo xtask smoke
        run: cargo xtask smoke

      # #478 diagnostic step 1: port-0xE9 debugcon capture around the
      # ring-0→ring-3 iretq. Upload on failure so investigators can see
      # whether iretq retired at all, independent of the serial path.
      - name: Upload debugcon log (#478 diagnostic)
        if: failure()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: smoke-debugcon-log
          path: target/debugcon.log
          if-no-files-found: ignore

  # Issue #462: end-to-end shell-pipeline integration test. Boots the
  # `userspace_shell_pipeline` binary as PID 1 and asserts the
  # `SHELL_PIPELINE_OK: 4` marker on serial. Exercises pipe2 + fork +
  # dup2 + close + read/write + wait4 against RFC 0003.
  shell-pipeline:
    name: shell-pipeline integration test
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Install system dependencies
        run: |
          sudo apt-get update -q
          sudo apt-get install -y --no-install-recommends \
            qemu-system-x86 xorriso build-essential

      - name: Set up Rust toolchain
        uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9 # master
        with:
          toolchain: nightly
          components: rust-src, llvm-tools, rustfmt, clippy
          targets: x86_64-unknown-none

      - name: Cache cargo + limine
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
            build/limine
          key: ${{ runner.os }}-cargo-shell-pipeline-${{ hashFiles('**/Cargo.lock', 'xtask/src/main.rs') }}
          restore-keys: |
            ${{ runner.os }}-cargo-shell-pipeline-
            ${{ runner.os }}-cargo-

      - name: cargo xtask shell-pipeline
        run: cargo xtask shell-pipeline

  # RFC 0004 Workstream G P2 (#582): run the vendored pjdfstest harness
  # (#580 + #581) and fail if the emitted
  # `target/pjdfstest-results.json` diverges from the committed baseline
  # at `tests/pjdfstest/baseline/expected.json`.
  #
  # At landing, vibix has no std-capable userspace target, so the
  # runner runs as a placeholder and emits 0 cases. The baseline is
  # therefore 0/0/0 and the job primarily guards against harness
  # regressions (kernel panic, QEMU watchdog, ext2 image builder break)
  # rather than real conformance signal. Once #642 ports the runner to
  # vibix userspace, this job starts seeing real markers and the
  # baseline will be bumped via `cargo xtask pjdfstest --update-baseline`.
  #
  # Required (not advisory) check: "does the harness run cleanly" is
  # already worth enforcing, and flipping from required-advisory later
  # is harder than starting required.
  pjdfstest-conformance:
    name: pjdfstest conformance
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Install system dependencies
        run: |
          sudo apt-get update -q
          sudo apt-get install -y --no-install-recommends \
            qemu-system-x86 xorriso e2fsprogs build-essential

      - name: Set up Rust toolchain
        uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9 # master
        with:
          toolchain: nightly
          components: rust-src, llvm-tools, rustfmt, clippy
          targets: x86_64-unknown-none

      - name: Cache cargo + limine
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
            build/limine
          key: ${{ runner.os }}-cargo-pjdfstest-${{ hashFiles('**/Cargo.lock', 'xtask/src/main.rs', 'xtask/src/pjdfstest.rs') }}
          restore-keys: |
            ${{ runner.os }}-cargo-pjdfstest-
            ${{ runner.os }}-cargo-

      - name: cargo xtask pjdfstest --compare-baseline
        run: cargo xtask pjdfstest --compare-baseline

      # Always upload the emitted results artefact so a maintainer
      # updating the baseline can just download it and commit the diff.
      - name: Upload pjdfstest results JSON
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: pjdfstest-results
          path: target/pjdfstest-results.json
          if-no-files-found: warn
