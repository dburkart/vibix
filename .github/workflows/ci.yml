name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Install system dependencies
        run: |
          sudo apt-get update -q
          sudo apt-get install -y --no-install-recommends \
            qemu-system-x86 xorriso build-essential

      - name: Set up Rust toolchain
        uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9 # master
        with:
          toolchain: nightly
          components: rust-src, llvm-tools, rustfmt, clippy
          targets: x86_64-unknown-none

      - name: Cache cargo + limine
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
            build/limine
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: cargo fmt --check
        run: cargo fmt --all -- --check

      # Kernel clippy requires --target x86_64-unknown-none + -Z build-std,
      # which isn't wired through xtask yet. Scope clippy to the host-crate
      # (xtask) for now; kernel clippy is a follow-up.
      - name: cargo clippy (xtask)
        run: cargo clippy -p xtask --all-targets -- -D warnings

      - name: cargo xtask test
        run: cargo xtask test

      - name: cargo xtask smoke
        run: cargo xtask smoke

      - name: cargo xtask build --release
        run: cargo xtask build --release

  file-bug:
    needs: test
    if: failure() && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write
      id-token: write
      actions: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 1

      - name: File bug via Claude
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          additional_permissions: |
            actions: read
          claude_args: >-
            --allowed-tools
            "Bash(gh run view:*)"
            "Bash(gh issue list:*)"
            "Skill(file-issue)"
          prompt: |
            The CI build on the main branch of the vibix kernel repo just failed.

            Workflow run URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
            Repository: ${{ github.repository }}
            Branch: ${{ github.ref_name }}
            Commit SHA: ${{ github.sha }}
            Commit message: ${{ github.event.head_commit.message }}
            Actor: ${{ github.actor }}

            Fetch the full failure details with:
              gh run view ${{ github.run_id }} --log-failed

            Then file exactly one bug issue via the `file-issue` skill (`/file-issue`).
            Do NOT call `gh issue create` directly — use the skill so labels are applied
            correctly per the prioritization playbook.

            The issue must include:
            - Title: "CI: main branch build failed — <short description of failing step>"
            - Which job/step failed and the first error message from the log
            - The workflow run URL above so it is easy to navigate to the logs
            - The commit SHA and message that introduced the failure

            Before filing, run:
              gh issue list --state open --limit 20
            and skip filing if an identical open CI-failure issue already exists for
            this commit SHA.
