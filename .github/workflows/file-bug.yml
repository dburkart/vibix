name: File Bug on CI Failure

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]
    branches: [main]

jobs:
  file-bug:
    if: ${{ github.event.workflow_run.conclusion == 'failure' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write
      id-token: write
      actions: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 1

      - name: File bug via Claude
        uses: anthropics/claude-code-action@1c8b699d43e9bfed42b48ef15da85d89bab70960 # v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          additional_permissions: |
            actions: read
          claude_args: >-
            --allowed-tools
            "Bash(gh run view:*)"
            "Bash(gh issue list:*)"
            "Bash(cat:*)"
            "Read"
            "Skill(file-issue)"
            "mcp__github__search_issues"
            "mcp__github__add_issue_comment"
            "mcp__github__issue_write"
          prompt: |
            The CI build on the main branch of the vibix kernel repo just failed.

            Workflow run URL: ${{ github.event.workflow_run.html_url }}
            Repository: ${{ github.repository }}
            Branch: ${{ github.event.workflow_run.head_branch }}
            Commit SHA: ${{ github.event.workflow_run.head_sha }}
            Commit message: ${{ github.event.workflow_run.head_commit.message }}
            Actor: ${{ github.event.workflow_run.triggering_actor.login }}

            Fetch the full failure details with:
              gh run view ${{ github.event.workflow_run.id }} --log-failed

            Then file exactly one bug issue via the `file-issue` skill (`/file-issue`).
            Do NOT call `gh issue create` directly — use the skill so labels are applied
            correctly per the prioritization playbook.

            The issue must include:
            - Title: "CI: main branch build failed — <short description of failing step>"
            - Which job/step failed and the first error message from the log
            - The workflow run URL above so it is easy to navigate to the logs
            - The commit SHA and message that introduced the failure

            The `file-issue` skill handles duplicate detection automatically (it searches
            by issue title keywords). Do not add any extra deduplication step.
